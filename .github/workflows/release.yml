name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract tag version
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Check manifest.json version
        run: |
          manifest_version=$(python3 -c "import json; print(json.load(open('custom_components/signal_lights/manifest.json'))['version'])")
          if [ "$manifest_version" != "${{ steps.tag.outputs.version }}" ]; then
            echo "::error::Tag version (${{ steps.tag.outputs.version }}) != manifest.json ($manifest_version)"
            exit 1
          fi

      - name: Check pyproject.toml version
        run: |
          pyproject_version=$(python3 -c "
          import re
          text = open('pyproject.toml').read()
          m = re.search(r'^version\s*=\s*\"([^\"]+)\"', text, re.MULTILINE)
          print(m.group(1))
          ")
          if [ "$pyproject_version" != "${{ steps.tag.outputs.version }}" ]; then
            echo "::error::Tag version (${{ steps.tag.outputs.version }}) != pyproject.toml ($pyproject_version)"
            exit 1
          fi

  lint:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff mypy homeassistant
      - run: ruff check
      - run: mypy custom_components/signal_lights/ tests/

  test:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]" homeassistant
      - run: pytest --tb=short -q

  release:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
